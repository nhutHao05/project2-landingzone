---
- name: Deploy Web Portal (Replaces Log Analyzer)
  hosts: role_app
  become: yes
  tasks:
    - name: Ensure web-portal directory exists
      file:
        path: /home/ec2-user/web-portal
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy web-portal source code to remote host
      copy:
        src: "{{ playbook_dir }}/../../web-portal/"
        dest: /home/ec2-user/web-portal/
        owner: ec2-user
        group: ec2-user

    - name: Stop and remove old log-analyzer-ui container if exists
      community.docker.docker_container:
        name: log-analyzer-ui
        state: absent

    - name: Run Web Portal container (Nginx)
      community.docker.docker_container:
        name: soar-web-portal
        image: nginx:alpine
        state: started
        restart_policy: unless-stopped
        recreate: yes
        ports:
          - "8501:80"
        volumes:
          - /home/ec2-user/web-portal:/usr/share/nginx/html:ro
        log_driver: json-file
        log_options:
          max-size: "10m"
          max-file: "3"
