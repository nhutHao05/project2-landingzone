<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR Portal — Authenticating...</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0e17;
            --panel-bg: rgba(20, 26, 38, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            padding: 48px;
            text-align: center;
            max-width: 420px;
            animation: fadeIn 0.6s ease-out;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        h2 { margin-bottom: 12px; }
        p { color: var(--text-muted); font-size: 0.95rem; }
        .error { color: var(--danger); margin-top: 16px; font-size: 0.9rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Authenticating...</h2>
        <p id="message">Exchanging authorization code with Cognito</p>
        <p class="error" id="error" style="display:none;"></p>
    </div>

    <script>
    /**
     * Cognito OAuth2 PKCE Callback Handler
     * =====================================
     * Nhận authorization_code từ Cognito Hosted UI redirect,
     * exchange cho tokens bằng PKCE code_verifier đã lưu.
     */
    (async function handleCallback() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const errorDesc = params.get('error_description');

        if (error) {
            showError(`Cognito error: ${error} — ${errorDesc || 'Unknown'}`);
            return;
        }

        if (!code) {
            showError('No authorization code found in URL. Please login again.');
            return;
        }

        // Load config
        let config;
        try {
            const res = await fetch('config.json', { cache: 'no-store' });
            config = await res.json();
        } catch (e) {
            showError('Cannot load config.json');
            return;
        }

        const codeVerifier = sessionStorage.getItem('pkce_code_verifier');
        if (!codeVerifier) {
            showError('PKCE code_verifier not found. Please login again.');
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            return;
        }

        // Exchange code for tokens
        const tokenUrl = `${config.COGNITO_DOMAIN}/oauth2/token`;
        const body = new URLSearchParams({
            grant_type: 'authorization_code',
            client_id: config.COGNITO_CLIENT_ID,
            code: code,
            redirect_uri: config.COGNITO_REDIRECT_URI,
            code_verifier: codeVerifier,
        });

        try {
            const resp = await fetch(tokenUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body,
            });

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`Token exchange failed (${resp.status}): ${errText}`);
            }

            const tokens = await resp.json();

            // Lưu tokens vào sessionStorage
            sessionStorage.setItem('id_token', tokens.id_token);
            sessionStorage.setItem('access_token', tokens.access_token);
            if (tokens.refresh_token) {
                sessionStorage.setItem('refresh_token', tokens.refresh_token);
            }

            // Decode JWT để lấy user info
            const payload = JSON.parse(atob(tokens.id_token.split('.')[1]));
            sessionStorage.setItem('user_email', payload.email || payload['cognito:username'] || 'User');
            sessionStorage.setItem('user_groups', JSON.stringify(payload['cognito:groups'] || []));

            // Clean up PKCE verifier
            sessionStorage.removeItem('pkce_code_verifier');

            // Redirect to dashboard
            document.getElementById('title').textContent = 'Success!';
            document.getElementById('message').textContent = `Welcome, ${payload.email || 'User'}`;
            document.getElementById('spinner').style.display = 'none';

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);

        } catch (e) {
            showError(e.message);
        }
    })();

    function showError(msg) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Authentication Failed';
        document.getElementById('message').textContent = '';
        const el = document.getElementById('error');
        el.textContent = msg;
        el.style.display = 'block';
    }
    </script>
</body>
</html>
